<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ana & Remi — Training Schedule</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f5f4f2;--card:#fff;--text:#1e2228;--muted:#6b7280;
    --accent:#c0392b;--accent-light:#fbeae8;
    --accent2:#e67e22;--accent2-light:#fef3e2;
    --morning:#3b6ea5;--morning-light:#e0ecf7;
    --evening:#7a3b8c;--evening-light:#f2e8f8;
    --border:#e0ddd8;--radius:12px;
    --shadow:0 2px 8px rgba(0,0,0,.07);
  }
  html{font-size:15px;scroll-behavior:smooth}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding:3.8rem 1rem 3rem}
  .container{max-width:640px;margin:0 auto}

  /* ── Nav ── */
  .plan-nav{position:fixed;top:0;left:0;width:100%;height:2.8rem;background:#fff;display:flex;align-items:center;justify-content:center;gap:.5rem;z-index:200;box-shadow:0 1px 4px rgba(0,0,0,.1);border-bottom:1px solid var(--border);overflow-x:auto;padding:0 1rem;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .plan-nav::-webkit-scrollbar{display:none}
  .plan-nav a{text-decoration:none;font-size:.85rem;font-weight:600;padding:.35rem 1.1rem;border-radius:20px;transition:all .2s;border:1.5px solid transparent;white-space:nowrap;flex-shrink:0;display:inline-flex;align-items:center;gap:3px}
  .plan-nav a.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .plan-nav a:not(.active){color:var(--muted);border-color:var(--border);background:#fff}
  .plan-nav a:not(.active):hover{color:var(--text);border-color:var(--text)}

  /* ── Lang toggle ── */
  .lang-toggle{position:fixed;top:3.2rem;right:1rem;z-index:100;display:flex;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.12);border:1px solid var(--border)}
  .lang-btn{padding:.45rem 1rem;font-size:.85rem;font-weight:600;border:none;cursor:pointer;transition:all .2s}
  .lang-btn.active{background:var(--accent);color:#fff}
  .lang-btn:not(.active){background:#fff;color:var(--text)}

  /* ── Header ── */
  header{text-align:center;margin-bottom:2.5rem;padding-bottom:1.5rem;border-bottom:2px solid var(--border)}
  header .header-icon{font-size:2.2rem;margin-bottom:.5rem;display:block}
  header h1{font-size:1.7rem;font-weight:800;letter-spacing:.01em;margin-bottom:.35rem;line-height:1.2}
  header .subtitle{font-size:.95rem;color:var(--muted);font-weight:500;font-style:italic}

  /* ── Session count badge ── */
  .session-badge{display:inline-flex;align-items:center;gap:.4rem;background:var(--accent-light);color:var(--accent);font-size:.8rem;font-weight:700;padding:.3rem .9rem;border-radius:20px;border:1px solid rgba(192,57,43,.2);margin-top:.9rem}

  /* ── Schedule list ── */
  .schedule-list{display:flex;flex-direction:column;gap:.75rem;margin-bottom:2.5rem}

  .session-card{
    background:var(--card);
    border-radius:var(--radius);
    border:1px solid var(--border);
    box-shadow:var(--shadow);
    display:flex;
    align-items:center;
    gap:1rem;
    padding:1.1rem 1.4rem;
    position:relative;
    overflow:hidden;
  }
  .session-card::before{
    content:'';
    position:absolute;
    left:0;top:0;bottom:0;
    width:4px;
    background:var(--morning);
    border-radius:var(--radius) 0 0 var(--radius);
  }
  .session-card.evening::before{background:var(--evening)}
  .session-card.today{
    border-color:var(--accent);
    box-shadow:0 0 0 2px rgba(192,57,43,.15),var(--shadow);
  }
  .session-card.today::before{background:var(--accent)}

  .session-icon{
    width:42px;height:42px;
    border-radius:10px;
    background:var(--morning-light);
    display:flex;align-items:center;justify-content:center;
    font-size:1.3rem;
    flex-shrink:0;
  }
  .session-card.evening .session-icon{background:var(--evening-light)}
  .session-card.today .session-icon{background:var(--accent-light)}

  .session-info{flex:1;min-width:0}
  .session-day{font-size:1.05rem;font-weight:700;color:var(--text)}
  .session-type{font-size:.78rem;color:var(--muted);font-weight:500;margin-top:.05rem}

  .session-time{
    font-size:1.25rem;
    font-weight:800;
    color:var(--morning);
    letter-spacing:-.01em;
    white-space:nowrap;
  }
  .session-card.evening .session-time{color:var(--evening)}
  .session-card.today .session-time{color:var(--accent)}

  .today-badge{
    position:absolute;
    top:.55rem;right:.75rem;
    font-size:.65rem;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.06em;
    background:var(--accent);
    color:#fff;
    padding:.15rem .55rem;
    border-radius:10px;
  }

  /* ── Summary grid ── */
  .summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-bottom:2rem}
  .summary-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:.9rem;text-align:center;box-shadow:var(--shadow)}
  .summary-box .val{font-size:1.5rem;font-weight:800;color:var(--accent)}
  .summary-box .lbl{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:.1rem}

  /* ── Goal section ── */
  .goal-section{
    background:var(--card);
    border-radius:var(--radius);
    border:1px solid var(--border);
    box-shadow:var(--shadow);
    padding:1.4rem 1.6rem;
    border-top:4px solid var(--accent2);
  }
  .goal-title{
    font-size:1rem;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:var(--accent2);
    margin-bottom:.75rem;
    display:flex;
    align-items:center;
    gap:.5rem;
  }
  .goal-text{font-size:.93rem;color:var(--muted);line-height:1.7}
  .goal-text strong{color:var(--text)}

  /* ── Print ── */
  @media print{
    .plan-nav,.lang-toggle{display:none!important}
    .container{max-width:100%}
    .session-card{box-shadow:none;border:1px solid #ddd}
  }

  /* ── Mobile ── */
  @media(max-width:480px){
    .plan-nav{height:2.8rem;padding:0 .6rem;gap:.35rem;justify-content:flex-start}
    .plan-nav a{font-size:.76rem;padding:.26rem .7rem}
    .lang-toggle{top:2.8rem;right:.5rem}
    .lang-btn{padding:.35rem .7rem;font-size:.78rem}
    body{padding-top:3.4rem}
    .session-time{font-size:1.1rem}
    .summary-grid{gap:.4rem}
    .summary-box .val{font-size:1.25rem}
  }
</style>
</head>
<body>

<nav class="plan-nav">
  <a href="index.html">Ana's Plan</a>
  <a href="remi-diet.html">Remi's Plan</a>

   <a href="training-schedule.html" class="active" title="Training" aria-label="Training"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></a>
   <a href="progress.html" title="Progress" aria-label="Progress"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg></a>
</nav>

<div class="lang-toggle">
  <button class="lang-btn" onclick="setLang('es')">ES</button>
  <button class="lang-btn active" onclick="setLang('en')">EN</button>
</div>

<div class="container">

  <header>
    <span class="header-icon">🏋️</span>
    <h1 data-i18n="pageTitle">Ana &amp; Remi Weekly Training Schedule</h1>
    <p class="subtitle" data-i18n="pageSubtitle">Consistent sessions. Same team. Same mission.</p>
    <div class="session-badge">🔥 <span data-i18n="sessionBadge">6 sessions per week</span></div>
  </header>

  <!-- Weekly summary -->
  <div class="summary-grid">
    <div class="summary-box">
      <div class="val">6</div>
      <div class="lbl" data-i18n="summaryTotal">Sessions / Week</div>
    </div>
    <div class="summary-box">
      <div class="val">4</div>
      <div class="lbl" data-i18n="summaryMorning">Morning (9:30)</div>
    </div>
    <div class="summary-box">
      <div class="val">2</div>
      <div class="lbl" data-i18n="summaryEvening">Evening (7–8 PM)</div>
    </div>
  </div>

  <!-- Schedule — edit times in the SCHEDULE array in the script below -->
  <div class="schedule-list" id="scheduleList"></div>

  <!-- Goal -->
  <div class="goal-section">
    <div class="goal-title">
      <span>🎯</span> <span data-i18n="goalTitle">Goal</span>
    </div>
    <p class="goal-text" data-i18n="goalText">
      Stay consistent. <strong>Train together when possible.</strong>
      Build muscle. Stay disciplined.
    </p>
  </div>

</div>

<script>
  /* ── Translations ── */
  var translations = {
    en: {
      groceryNav:    'Grocery List',
      trainingNav:   'Training',
      progressNav:   'Progress',
      pageTitle:     'Ana & Remi Weekly Training Schedule',
      pageSubtitle:  'Consistent sessions. Same team. Same mission.',
      sessionBadge:  '6 sessions per week',
      summaryTotal:  'Sessions / Week',
      summaryMorning:'Morning (9:30)',
      summaryEvening:'Evening (7–8 PM)',
      goalTitle:     'Goal',
      goalText:      'Stay consistent. Train together when possible. Build muscle. Stay disciplined.',
      todayBadge:    'Today',
      morningLabel:  'Morning session',
      eveningLabel:  'Evening session',
      days: ['Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday']
    },
    es: {
      groceryNav:    'Lista de Compras',
      trainingNav:   'Entrenamiento',
      progressNav:   'Progreso',
      pageTitle:     'Horario Semanal de Entrenamiento — Ana & Remi',
      pageSubtitle:  'Sesiones constantes. Mismo equipo. Misma misión.',
      sessionBadge:  '6 sesiones por semana',
      summaryTotal:  'Sesiones / Semana',
      summaryMorning:'Mañana (9:30)',
      summaryEvening:'Tarde (7–8 PM)',
      goalTitle:     'Meta',
      goalText:      'Ser constantes. Entrenar juntos cuando sea posible. Ganar músculo. Mantenerse disciplinados.',
      todayBadge:    'Hoy',
      morningLabel:  'Sesión matutina',
      eveningLabel:  'Sesión vespertina',
      days: ['Martes','Miércoles','Jueves','Viernes','Sábado','Domingo']
    }
  };

  /* ── Training schedule data — edit times here ── */
  var SCHEDULE = [
    { slot: 'morning', time: '9:30 AM' },
    { slot: 'evening', time: '7:00 PM' },
    { slot: 'morning', time: '9:30 AM' },
    { slot: 'morning', time: '9:30 AM' },
    { slot: 'evening', time: '7:00 PM' },
    { slot: 'evening', time: '8:00 PM' }
  ];

  /* Day names that match JS getDay() values → for "today" detection */
  var EN_DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var todayName = EN_DAYS[new Date().getDay()];
  /* Map EN day name → schedule index (0-based) */
  var DAY_TO_IDX = { Tuesday:0, Wednesday:1, Thursday:2, Friday:3, Saturday:4, Sunday:5 };

  var currentLang = 'en';

  function renderSchedule(lang) {
    var t = translations[lang];
    var list = document.getElementById('scheduleList');
    list.innerHTML = '';
    SCHEDULE.forEach(function(session, i) {
      var dayName = t.days[i];
      var enDayName = translations.en.days[i];
      var isToday = enDayName === todayName;
      var isEvening = session.slot === 'evening';

      var card = document.createElement('div');
      card.className = 'session-card' + (isEvening ? ' evening' : '') + (isToday ? ' today' : '');

      card.innerHTML =
        '<div class="session-icon">🏋️</div>' +
        '<div class="session-info">' +
          '<div class="session-day">' + dayName + '</div>' +
          '<div class="session-type">' + (isEvening ? t.eveningLabel : t.morningLabel) + '</div>' +
        '</div>' +
        '<div class="session-time">' + session.time + '</div>' +
        (isToday ? '<span class="today-badge">' + t.todayBadge + '</span>' : '');

      list.appendChild(card);
    });
  }

  function setLang(lang) {
    currentLang = lang;
    document.documentElement.lang = lang;
    document.querySelectorAll('.lang-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.textContent.trim() === lang.toUpperCase());
    });
    var t = translations[lang];
    document.querySelectorAll('[data-i18n]').forEach(function(el) {
      var key = el.getAttribute('data-i18n');
      if (t[key] !== undefined) {
        /* goalText contains HTML strong tag — use innerHTML for it */
        if (key === 'goalText') {
          if (lang === 'es') {
            el.innerHTML = 'Ser constantes. <strong>Entrenar juntos cuando sea posible.</strong> Ganar músculo. Mantenerse disciplinados.';
          } else {
            el.innerHTML = 'Stay consistent. <strong>Train together when possible.</strong> Build muscle. Stay disciplined.';
          }
        } else {
          el.textContent = t[key];
        }
      }
    });
    renderSchedule(lang);
  }

  /* Initial render */
  renderSchedule(currentLang);
</script>

</body>
</html>
